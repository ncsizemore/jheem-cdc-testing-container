name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      base_version:
        description: 'jheem-base version (e.g., 1.2.0). Leave empty for default.'
        required: false
        default: ''
  repository_dispatch:
    types: [base-image-updated]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jheem-cdc-testing-model

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine base version
      id: base
      run: |
        if [ -n "${{ github.event.client_payload.base_version }}" ]; then
          echo "version=${{ github.event.client_payload.base_version }}" >> $GITHUB_OUTPUT
          echo "Using base version from dispatch: ${{ github.event.client_payload.base_version }}"
        elif [ -n "${{ github.event.inputs.base_version }}" ]; then
          echo "version=${{ github.event.inputs.base_version }}" >> $GITHUB_OUTPUT
          echo "Using base version from input: ${{ github.event.inputs.base_version }}"
        else
          echo "version=1.0.0" >> $GITHUB_OUTPUT
          echo "Using default base version: 1.0.0"
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BASE_VERSION=${{ steps.base.outputs.version }}

    - name: Generate build summary
      run: |
        echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "**Base Version:** ${{ steps.base.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Platforms:** linux/amd64" >> $GITHUB_STEP_SUMMARY
